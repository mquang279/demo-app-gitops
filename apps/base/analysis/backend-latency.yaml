apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-latency
spec:
  metrics:
    - name: backend-p95-latency
      interval: 30s
      count: 3
      failureLimit: 1
      successCondition: result[0] < 0.5
      provider:
        prometheus:
          address: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
          query: |
            histogram_quantile(
              0.95,
              sum(rate(http_request_duration_seconds_bucket{service="backend-canary"}[1m])) by (le)
            )
