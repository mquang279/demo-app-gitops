apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: frontend
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    blueGreen:
      autoPromotionEnabled: true
      autoPromotionSeconds: 30
      activeService: frontend-stable
      previewService: frontend-canary
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - image: mquang279/demo-frontend:latest
          name: app-frontend
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
