apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: backend
    component: api
  name: backend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
  strategy:
    blueGreen: null
    canary:
      steps:
      - setWeight: 20
      - pause:
          duration: 10s
      - setWeight: 40
      - pause:
          duration: 10s
      - setWeight: 60
      - pause:
          duration: 10s
      - setWeight: 80
      - pause:
          duration: 10s
      - setWeight: 100