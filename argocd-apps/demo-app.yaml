apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-observability-demo-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/mquang279/demo-app-gitops.git
    targetRevision: main
    path: apps/cicd-observability-demo/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true