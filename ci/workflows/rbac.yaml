apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-workflow-sa
  namespace: argo-events
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-workflow-role
  namespace: argo-events
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtaskresults
    verbs:
      - create
      - patch
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-workflow-rolebinding
  namespace: argo-events
subjects:
  - kind: ServiceAccount
    name: ci-workflow-sa
    namespace: argo-events
roleRef:
  kind: Role
  name: ci-workflow-role
  apiGroup: rbac.authorization.k8s.io